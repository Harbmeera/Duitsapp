<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duits leren</title>
<style>

body{
text-align: center;
font-family: Arial, sans-serif;
}

input{
margin:15px;
padding:6px 8px;
}

button{
margin:10px;
padding:6px 12px;
cursor:pointer;
}

table{
margin:20px auto;
border-collapse:collapse;
}

td, th{
border:1px solid #333;
padding:8px 12px;
}

tr:nth-child(even){
background:#f5f5f5;
}
canvas {
    padding-left: 0;
    padding-right: 0;
    margin-left: auto;
    margin-right: auto;
    display: block;
    width: 800px;
}
</style>
<body id="body">
    <label for="kapitel">Welche Kapitel? z.B.: 1.1,1.3,1.4 (für alle, offen lassen)</label><br>
<input id="kapitels" name="kapitel" placeholder=""></input><br>
<label for="aantal">Wie viele Wörter?</label><br>
<input id="aantal" name="aantal" type="number" placeholder="" max="30" min="1" value="10"></input><br>

<button onclick="startTEST(document.getElementById('aantal').value, document.getElementById('kapitels').value)">Starte den Test</button><br>
<canvas id="myChart" style="width:100%;max-width:700px"></canvas>
</canvas>

<script src="words.js"></script>
<script src="chart.js"></script>
<script src="script.js" type="module"></script>

</body>
</html>
